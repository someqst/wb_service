version: '3.9'

services:
  web:
    container_name: wb_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    env_file:
      - .env
    depends_on:
      - db
    command: bash -c 'alembic upgrade head && python3 app.py'

  bot:
    container_name: wb_bot
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      - db
    command: bash -c 'python3 bot.py'
      
  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "5433:5432"
